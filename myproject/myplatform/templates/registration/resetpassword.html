{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock title %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 15px;">
        <div class="card-body p-5">
            <h3 class="fw-bold text-center mb-4">Сброс пароля</h3>
            <p class="text-center text-muted">Аккаунт: <strong>{{ username }}</strong></p>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Новый пароль</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Подтвердите пароль</label>
                    <input type="password" name="confirm_password" class="form-control" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Сохранить пароль</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
