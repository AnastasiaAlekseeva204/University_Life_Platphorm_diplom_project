{% extends 'base.html' %}
{% block title %}Регистрация{% endblock title %}
{% block content %}
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10 col-md-12 col-sm-12">
                <div class="card shadow-lg">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Форма регистрации</h3>
                        <form id="registrationForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Full Name</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="name" 
                                    placeholder="Enter your full name" 
                                    required 
                                />
                                <div class="form-text">Please enter your full name.</div>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email address</label>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="email" 
                                    placeholder="Enter your email" 
                                    required 
                                />
                                <div class="form-text">Please enter a valid email address.</div>
                            </div>
                            <div class="mb-3">
                                <label for="dob" class="form-label">Date of Birth</label>
                                <input 
                                    type="date" 
                                    class="form-control" 
                                    id="dob" 
                                    required 
                                />
                            </div>
                            <div class="mb-3">
                                <label for="bio" class="form-label">Bio</label>
                                <textarea 
                                    class="form-control" 
                                    id="bio" 
                                    rows="3" 
                                    placeholder="Tell us about yourself" 
                                    required
                                ></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="profileImage" class="form-label">Profile Image</label>
                                <input 
                                    type="file" 
                                    class="form-control" 
                                    id="profileImage" 
                                    accept="image/*" 
                                    required
                                />
                            </div>
                        </div>
                    </div>
                </div>
        </div>
    </div>
    <div class="text-center">
        <button type="submit" class="btn btn-primary btn-lg">Зарегистрировать</button>
        <div id="formFeedback" class="mt-3"></div>
    </div>
{% endblock content %}
