{% extends 'base.html' %}
{% block title %}Восстановление доступа{% endblock title %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="max-width: 400px; width: 100%; border-radius: 15px;">
        <div class="card-body p-5">
            
            <div class="text-center mb-4">
                <div class="display-4 text-primary mb-2">
                    <i class="bi bi-shield-lock"></i> </div>
                <h2 class="fw-bold">Забыли пароль?</h2>
                <p class="text-muted">Введите ваше имя пользователя, чтобы мы могли подтвердить ваш аккаунт.</p>
            </div>

            <form method="post">
                {% csrf_token %}
                
                <div class="form-floating mb-3">
                    <input type="text" 
                           class="form-control" 
                           id="username" 
                           name="username" 
                           placeholder="username"
                           style="border-radius: 10px;"
                           required>
                    <label for="username">Имя пользователя</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg shadow-sm" style="border-radius: 10px; transition: 0.3s;">
                        Проверить аккаунт
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-decoration-none small text-muted">
                    <i class="bi bi-arrow-left"></i> Вернуться ко входу
                </a>
            </div>
            
        </div>
    </div>
</div>
{% endblock content %}
